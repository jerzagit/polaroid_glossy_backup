# Spring Boot UAT Profile — application-uat.properties
# Place this in src/main/resources/application-uat.properties
# Run with: java -jar app.jar --spring.profiles.active=uat

# Database — same PostgreSQL instance as Next.js UAT
spring.datasource.url=jdbc:postgresql://localhost:5432/polaroid_glossy_uat
spring.datasource.username=jerza
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Amazon S3 (same dev bucket as Next.js)
cloud.aws.credentials.access-key=AKIAT3ZKKEKVEGDA2FEW
cloud.aws.credentials.secret-key=<AWS_SECRET_ACCESS_KEY>
cloud.aws.region.static=us-east-1
cloud.aws.s3.bucket=polaroid-glossy-dev

# Server
server.port=8080

# CORS — allow Next.js dev + ngrok
spring.mvc.cors.allowed-origins=http://localhost:3000,https://remissly-sirenic-jacinda.ngrok-free.dev
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true
